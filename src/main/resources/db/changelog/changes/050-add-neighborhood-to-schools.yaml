databaseChangeLog:
  - changeSet:
      id: 050-add-neighborhood-to-schools
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: schools
                columnName: neighborhood
      changes:
        - addColumn:
            tableName: schools
            columns:
              - column:
                  name: neighborhood
                  type: VARCHAR(255)
