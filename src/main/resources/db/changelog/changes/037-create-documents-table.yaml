databaseChangeLog:
  - changeSet:
      id: 037-create-documents-table
      author: antigravity
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_url
                  type: varchar(1024)
                  constraints:
                    nullable: false
              - column:
                  name: uploader_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: module_id
                  type: uuid
              - column:
                  name: session_id
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: uploader_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_documents_uploader
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: module_id
            referencedTableName: modules
            referencedColumnNames: id
            constraintName: fk_documents_module
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: session_id
            referencedTableName: sessions
            referencedColumnNames: id
            constraintName: fk_documents_session
            onDelete: CASCADE
