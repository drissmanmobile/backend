databaseChangeLog:
  - changeSet:
      id: 048-create-vehicles-table
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: vehicles
      changes:
        - createTable:
            tableName: vehicles
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: school_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_vehicles_schools
                    references: schools(id)
              - column:
                  name: brand
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: registration_number
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: transmission
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
