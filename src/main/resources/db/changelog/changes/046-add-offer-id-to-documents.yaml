databaseChangeLog:
  - changeSet:
      id: 046-add-offer-id-to-documents
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: documents
                columnName: offer_id
      changes:
        - addColumn:
            tableName: documents
            columns:
              - column:
                  name: offer_id
                  type: uuid
        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: offer_id
            referencedTableName: offers
            referencedColumnNames: id
            constraintName: fk_documents_offer
            onDelete: CASCADE
