databaseChangeLog:
  - changeSet:
      id: 051-create-chat-messages-table
      author: antigravity
      changes:
        - createTable:
            tableName: chat_messages
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sender_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_messages_sender
                    references: users(id)
              - column:
                  name: recipient_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_messages_recipient
                    references: users(id)
              - column:
                  name: offer_id
                  type: uuid
                  constraints:
                    nullable: true
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_chat_messages_thread
            tableName: chat_messages
            columns:
              - column:
                  name: sender_id
              - column:
                  name: recipient_id
        - createIndex:
            indexName: idx_chat_messages_recipient_unread
            tableName: chat_messages
            columns:
              - column:
                  name: recipient_id
              - column:
                  name: is_read
