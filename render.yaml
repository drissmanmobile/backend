services:
  - type: web
    name: drissman-backend
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: drissman-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: drissman-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: drissman-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: drissman-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: drissman-db
          property: password
      - key: JWT_SECRET
        value: bru6mlxlAdHXjhPqTstm4QkPqxe8HSbQN2cVGqEqR77JOHBGfbZxZE7J+5CocGNj
      - key: KERNEL_CLIENT_ID
        value: prod-platform-backend
      - key: KERNEL_API_KEY
        value: VbWi225xzYPoD8rQ2FRniTAqkylh34XYeWxa9HCU
      - key: KERNEL_TENANT_ID
        value: 11111111-1111-1111-1111-111111111111

databases:
  - name: drissman-db
    databaseName: drissman
    user: drissman
    plan: free
    region: frankfurt
